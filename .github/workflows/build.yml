name: Build Mold Forge Executables (Self-Hosted)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os-label }}
    runs-on: [self-hosted, "${{ matrix.os-label }}"]
    strategy:
      fail-fast: false # Se uno fallisce, gli altri continuano a compilare
      matrix:
        include:
          - os-label: windows-local
            python_cmd: python # Comando Python per Windows
          - os-label: arch-local
            python_cmd: python3 # Comando Python per Linux
          - os-label: mac-local
            python_cmd: python3 # Comando Python per Mac

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Install Dependencies
      run: |
        ${{ matrix.python_cmd }} -m pip install --upgrade pip
        ${{ matrix.python_cmd }} -m pip install cadquery PySide6==6.6.3 pyinstaller
        ${{ matrix.python_cmd }} -m pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        ${{ matrix.python_cmd }} -m PyInstaller MoldForge.spec

    - name: Codesign ad-hoc per Apple Silicon (Solo su Mac)
      if: matrix.os-label == 'mac-local'
      run: codesign --force --deep --sign - dist/MoldForge.app

    - name: Pacchettizzazione per il rilascio macOS (Solo su Mac)
      if: matrix.os-label == 'mac-local'
      run: |
        cd dist
        ditto -c -k --keepParent MoldForge.app MoldForge-macOS-ARM64.zip
        mkdir -p MOLDFORGE_RELEASE
        mv MoldForge-macOS-ARM64.zip MOLDFORGE_RELEASE/

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MoldForge-${{ matrix.os-label }}
        path: dist/MOLDFORGE_RELEASE/