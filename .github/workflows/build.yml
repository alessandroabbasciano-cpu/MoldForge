name: Build Mold Forge Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-22.04, macos-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Linux Graphics Libraries
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libosmesa6 libglu1-mesa libxi-dev libxmu-dev libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-xinerama0 libxcb-xkb1 libxkbcommon-x11-0

    - name: Setup Miniconda
      uses: conda-incubator/setup-miniconda@v2
      with:
        miniconda-version: "latest"
        python-version: "3.10"
        auto-update-conda: true
        activate-environment: moldforge

    - name: Install Dependencies
      shell: bash -l {0}
      run: |
        conda install -c cadquery -c conda-forge cadquery
        pip install -r requirements.txt
        pip install PySide6==6.6.3 pyinstaller

    - name: Build with PyInstaller
      shell: bash -l {0}
      run: |
        pyinstaller MoldForge.spec

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MoldForge-${{ runner.os }}
        path: dist/MOLDFORGE_RELEASE/