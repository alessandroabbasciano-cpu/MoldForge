name: Build Mold Forge Executables (Self-Hosted)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os-label }}
    runs-on: [self-hosted, "${{ matrix.os-label }}"]
    strategy:
      fail-fast: false # Se uno cade, gli altri continuano l'assalto
      matrix:
        include:
          - os-label: windows-local
            method: native
            python_cmd: python
            env_python: python
          
          - os-label: mac-local
            method: native
            python_cmd: python3
            env_python: venv/bin/python
            
          - os-label: arch-local
            method: docker

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Virtual Environment (Solo Mac)
      if: matrix.os-label == 'mac-local'
      run: python3 -m venv venv

    - name: Install Dependencies (Windows/Mac)
      if: matrix.method == 'native'
      run: |
        ${{ matrix.env_python }} -m pip install --upgrade pip
        ${{ matrix.env_python }} -m pip install cadquery PySide6==6.6.3 pyinstaller
        ${{ matrix.env_python }} -m pip install -r requirements.txt

    - name: Build with PyInstaller (Windows/Mac)
      if: matrix.method == 'native'
      run: |
        ${{ matrix.env_python }} -m PyInstaller MoldForge.spec

    - name: Build in Ubuntu 20.04 Container (Solo Arch)
      if: matrix.method == 'docker'
      run: |
        cat << 'EOF' > build_linux.sh
        apt-get update
        # Installa python, venv e tutte le dipendenze grafiche per CadQuery/VTK
        DEBIAN_FRONTEND=noninteractive apt-get install -y python3 python3-pip python3-venv libosmesa6 libglu1-mesa libxi-dev libxmu-dev libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-xinerama0 libxcb-xkb1 libxkbcommon-x11-0 libxcb-shape0 libxcb-cursor0
        
        # Isola le librerie python
        python3 -m venv venv
        source venv/bin/activate
        pip install --upgrade pip
        pip install cadquery PySide6==6.6.3 pyinstaller
        pip install -r requirements.txt
        
        # Compila!
        pyinstaller MoldForge.spec
        
        # Ripristina i permessi della cartella generata in modo che Arch possa caricarla
        chown -R $(stat -c "%u:%g" .) dist/
        EOF
        chmod +x build_linux.sh
        
        # Lancia il container agganciando la cartella di lavoro di GitHub Actions
        docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace ubuntu:20.04 bash build_linux.sh

    - name: Codesign ad-hoc per Apple Silicon (Solo su Mac)
      if: matrix.os-label == 'mac-local'
      run: codesign --force --deep --sign - dist/MoldForge.app

    - name: Pacchettizzazione per il rilascio macOS (Solo su Mac)
      if: matrix.os-label == 'mac-local'
      run: |
        cd dist
        ditto -c -k --keepParent MoldForge.app MoldForge-macOS-ARM64.zip
        mkdir -p MOLDFORGE_RELEASE
        mv MoldForge-macOS-ARM64.zip MOLDFORGE_RELEASE/

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MoldForge-${{ matrix.os-label }}
        path: dist/MOLDFORGE_RELEASE/