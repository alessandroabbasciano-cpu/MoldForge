name: Build Mold Forge Executables (Self-Hosted)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os-label }}
    runs-on: [self-hosted, "${{ matrix.os-label }}"]
    strategy:
      fail-fast: false 
      matrix:
        include:
          # Windows: Native build via PowerShell activation
          - os-label: windows-local
            method: native
            python_cmd: python
            activate: .\venv\Scripts\Activate.ps1
          
          # Mac: Native build via POSIX activation
          - os-label: mac-local
            method: native
            python_cmd: python3
            activate: source venv/bin/activate
            
          # Arch Linux: Docker build (Ubuntu 22.04 for Python 3.10 support)
          - os-label: arch-local
            method: docker

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # ==========================================
    # NATIVE BUILD PIPELINE (Windows & Mac)
    # ==========================================
    - name: Setup Virtual Environment (Windows & Mac)
      if: matrix.method == 'native'
      run: ${{ matrix.python_cmd }} -m venv venv

    - name: Install Dependencies (Windows & Mac)
      if: matrix.method == 'native'
      run: |
        ${{ matrix.activate }}
        python -m pip install --upgrade pip
        pip install cadquery PySide6==6.6.3 pyinstaller
        pip install -r requirements.txt

    - name: Build with PyInstaller (Windows & Mac)
      if: matrix.method == 'native'
      run: |
        ${{ matrix.activate }}
        pyinstaller MoldForge.spec

    # ==========================================
    # DOCKER BUILD PIPELINE (Arch Linux)
    # ==========================================
    - name: Prepare Docker Image (Arch Linux Only)
      if: matrix.method == 'docker'
      run: |
        cat << 'EOF' > Dockerfile.builder
        FROM ubuntu:22.04
        ENV DEBIAN_FRONTEND=noninteractive
        
        # Install system dependencies (Cached)
        RUN apt-get update && apt-get install -y python3 python3-pip python3-venv libosmesa6 libglu1-mesa libxi-dev libxmu-dev libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-xinerama0 libxcb-xkb1 libxkbcommon-x11-0 libxcb-shape0 libxcb-cursor0
        
        # Create venv and install heavy Python libraries (Cached)
        RUN python3 -m venv /opt/venv
        ENV PATH="/opt/venv/bin:$PATH"
        RUN pip install --upgrade pip cadquery PySide6==6.6.3 pyinstaller
        EOF
        
        docker build -t moldforge-ubuntu-builder -f Dockerfile.builder .

    - name: Compile in Docker (Arch Linux Only)
      if: matrix.method == 'docker'
      run: |
        docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace moldforge-ubuntu-builder bash -c "pip install -r requirements.txt && pyinstaller MoldForge.spec && chown -R \$(stat -c '%u:%g' .) ."

    # ==========================================
    # POST-BUILD & RELEASE PACKAGING
    # ==========================================
    - name: Ad-hoc Codesign for Apple Silicon (Mac Only)
      if: matrix.os-label == 'mac-local'
      run: codesign --force --deep --sign - dist/MoldForge.app

    - name: Package macOS Release (Mac Only)
      if: matrix.os-label == 'mac-local'
      run: |
        cd dist
        ditto -c -k --keepParent MoldForge.app MoldForge-macOS-ARM64.zip
        mkdir -p MOLDFORGE_RELEASE
        mv MoldForge-macOS-ARM64.zip MOLDFORGE_RELEASE/

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MoldForge-${{ matrix.os-label }}
        path: dist/MOLDFORGE_RELEASE/