name: Build Mold Forge Executables (Self-Hosted)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os-label }}
    runs-on: [self-hosted, "${{ matrix.os-label }}"]
    strategy:
      fail-fast: false 
      matrix:
        include:
          - os-label: windows-local
          - os-label: mac-local
          - os-label: arch-local

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # ==========================================
    # WINDOWS PIPELINE (CMD Shell explicitly)
    # ==========================================
    - name: Build on Windows
      if: matrix.os-label == 'windows-local'
      shell: cmd
      run: |
        py -3.10 -m venv venv
        venv\Scripts\python.exe -m pip install --upgrade pip setuptools wheel cmake
        venv\Scripts\pip.exe install "numpy<2.0.0" cadquery PySide6==6.6.3 pyinstaller
        venv\Scripts\pip.exe install -r requirements.txt
        venv\Scripts\pyinstaller.exe MoldForge.spec

    # ==========================================
    # MAC PIPELINE (POSIX Native)
    # ==========================================
    - name: Build on Mac
      if: matrix.os-label == 'mac-local'
      run: |
        python3 -m venv venv
        venv/bin/python -m pip install --upgrade pip setuptools wheel cmake
        venv/bin/pip install "numpy<2.0.0" cadquery PySide6==6.6.3 pyinstaller
        venv/bin/pip install -r requirements.txt
        venv/bin/pyinstaller MoldForge.spec

    - name: Ad-hoc Codesign (Mac Only)
      if: matrix.os-label == 'mac-local'
      run: codesign --force --deep --sign - dist/MoldForge.app

    - name: Package macOS Release (Mac Only)
      if: matrix.os-label == 'mac-local'
      run: |
        cd dist
        ditto -c -k --keepParent MoldForge.app MoldForge-macOS-ARM64.zip
        mkdir -p MOLDFORGE_RELEASE
        mv MoldForge-macOS-ARM64.zip MOLDFORGE_RELEASE/

    # ==========================================
    # ARCH LINUX PIPELINE (Docker Ubuntu 22.04)
    # ==========================================
    - name: Prepare Docker Image (Arch Linux Only)
      if: matrix.os-label == 'arch-local'
      run: |
        cat << 'EOF' > Dockerfile.builder
        FROM ubuntu:22.04
        ENV DEBIAN_FRONTEND=noninteractive
        RUN apt-get update && apt-get install -y python3 python3-pip python3-venv libgl1 libgl1-mesa-glx libosmesa6 libglu1-mesa libxi-dev libxmu-dev libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-xinerama0 libxcb-xkb1 libxkbcommon-x11-0 libxcb-shape0 libxcb-cursor0 python3-tk libglib2.0-0 libxrender1 libdbus-1-3
        RUN python3 -m venv /opt/venv
        ENV PATH="/opt/venv/bin:$PATH"
        RUN pip install --upgrade pip "numpy<2.0.0" cadquery PySide6==6.6.3 pyinstaller
        EOF
        docker build -t moldforge-ubuntu-builder -f Dockerfile.builder .

    - name: Compile in Docker (Arch Linux Only)
      if: matrix.os-label == 'arch-local'
      run: |
        cat << 'EOF' > build_linux.sh
        pip install -r requirements.txt
        
        # Modify spec to enable console for debugging and ensure consistent naming
        sed -i 's/console=False/console=True/g' MoldForge.spec
        
        # Build using PyInstaller forcing onedir
        pyinstaller --onedir --windowed --name MoldForgeApp app.py --hidden-import vtkmodules --hidden-import cadquery --hidden-import PySide6
        
        # Clean up the problematic library that conflicts with Arch Linux's Mesa
        rm -f dist/MoldForgeApp/libstdc++.so.6
        
        # Restore permissions to the workspace
        chown -R $(stat -c '%u:%g' .) .
        EOF
        chmod +x build_linux.sh
        docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace moldforge-ubuntu-builder bash build_linux.sh

    # ==========================================
    # ARTIFACT UPLOAD
    # ==========================================
    - name: Upload Artifacts (Mac)
      if: matrix.os-label == 'mac-local'
      uses: actions/upload-artifact@v4
      with:
        name: MoldForge-mac-local
        path: dist/MOLDFORGE_RELEASE/

    - name: Upload Artifacts (Windows)
      if: matrix.os-label == 'windows-local'
      uses: actions/upload-artifact@v4
      with:
        name: MoldForge-${{ matrix.os-label }}
        path: dist/
        
    - name: Upload Artifacts (Arch)
      if: matrix.os-label == 'arch-local'
      uses: actions/upload-artifact@v4
      with:
        name: MoldForge-${{ matrix.os-label }}
        path: dist/MoldForgeApp/