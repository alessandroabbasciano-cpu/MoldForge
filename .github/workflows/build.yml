name: Build Mold Forge Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-22.04, macos-14]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Linux Graphics Libraries
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libosmesa6 libglu1-mesa libxi-dev libxmu-dev libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-xinerama0 libxcb-xkb1 libxkbcommon-x11-0 libxcb-shape0 libxcb-cursor0
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Dependencies
      shell: bash
      run: |
        pip install cadquery
        pip install -r requirements.txt
        pip install PySide6==6.6.3 pyinstaller

    - name: Build with PyInstaller
      shell: bash
      run: |
        pyinstaller MoldForge.spec

    - name: Codesign ad-hoc per Apple Silicon
      if: runner.os == 'macOS'
      run: codesign --force --deep --sign - dist/MoldForge.app

    - name: Pacchettizzazione per il rilascio macOS
      if: runner.os == 'macOS'
      run: |
        cd dist
        ditto -c -k --keepParent MoldForge.app MoldForge-macOS-ARM64.zip
        mv MoldForge-macOS-ARM64.zip MOLDFORGE_RELEASE/

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MoldForge-${{ runner.os }}
        path: dist/MOLDFORGE_RELEASE/