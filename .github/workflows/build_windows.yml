name: Build Windows (Self-Hosted)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  
jobs:
  build-windows:
    runs-on: [self-hosted, windows-local]
    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Generate version file from Git Tag
      shell: powershell
      run: |
        "__version__ = '${{ github.ref_name }}'" | Out-File -FilePath version.py -Encoding utf8

    - name: Build with PyInstaller on Windows
      shell: cmd
      run: |
        py -3.10 -m venv venv
        venv\Scripts\python.exe -m pip install --upgrade pip
        venv\Scripts\pip.exe install cadquery PySide6==6.6.3 pyinstaller
        venv\Scripts\pip.exe install -r requirements.txt
        venv\Scripts\pyinstaller.exe MoldForge_win.spec

    - name: Create Clean ZIP
      shell: powershell
      run: |
        Compress-Archive -Path "dist\MOLDFORGE_RELEASE\*" -DestinationPath "dist\MoldForge-Windows.zip"

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v5
      with:
        name: MoldForge-Windows
        path: dist/MoldForge-Windows.zip