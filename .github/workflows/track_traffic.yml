name: Track GitHub Traffic

on:
  schedule:
    # Runs every Sunday at 23:59 UTC
    - cron: '59 23 * * 0'
  workflow_dispatch: # Allows manual trigger

jobs:
  update-csv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run traffic tracking script
        env:
          TRAFFIC_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
        run: python update_stats.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add traffic_stats.csv
          # Prevent failure if no changes are detected
          git commit -m "chore: log weekly traffic stats [skip ci]" || echo "No changes to commit"
          git push