name: Track GitHub Traffic

on:
  schedule:
    # Si attiva ogni domenica alle 23:59
    - cron: '59 23 * * 0'
  workflow_dispatch: # Ci permette di avviarlo manualmente con un pulsante

jobs:
  update-csv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run tracking script
        env:
          TRAFFIC_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
        run: python update_stats.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add stats.csv
          # Evita che l'action fallisca se non ci sono nuovi dati da salvare
          git commit -m "chore: aggiornato log del traffico [skip ci]" || echo "Nessuna modifica al file"
          git push