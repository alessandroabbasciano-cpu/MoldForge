name: Build Mac (Self-Hosted)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: [self-hosted, mac-local]
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install -r requirements.txt
        python3 -m pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        python3 -m PyInstaller --noconfirm MoldForge.spec
    
    - name: Ad-hoc Codesign for ARM64
      run: |
        find dist/MOLDFORGE_RELEASE -type f \( -name "*.dylib" -o -name "*.so" -o -name "MoldForgeApp" \) -exec codesign --force --deep --sign - {} \;

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MoldForge-Mac
        path: dist/