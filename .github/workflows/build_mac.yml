name: Build Mac (Self-Hosted ARM64 Folder Mode)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: [self-hosted, mac-local]
    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Deep Clean and Setup Virtual Environment (ARM64 Native)
      run: |
        rm -rf build/ dist/ venv/
        python3 -m venv venv
        source venv/bin/activate
        python3 -m pip install --upgrade pip
        python3 -m pip install -r requirements.txt
        python3 -m pip install pyinstaller
        python3 -c "import matplotlib.font_manager"
        
    - name: Build the application
      run: |
        source venv/bin/activate
        python3 -m PyInstaller --noconfirm MoldForge_mac.spec
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v5
      with:
        name: MoldForge-Mac-ARM64
        path: dist/MOLDFORGE_RELEASE/
        retention-days: 5