name: Build Mac (Self-Hosted Hybrid App)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: [self-hosted, mac-local]
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deep Clean and Setup Virtual Environment (x64)
      run: |
        rm -rf build/ dist/ venv/
        
        arch -x86_64 /Library/Frameworks/Python.framework/Versions/3.11/bin/python3 -m venv venv
        source venv/bin/activate
        
        arch -x86_64 python3 -m pip install --upgrade pip
        arch -x86_64 python3 -m pip install -r requirements.txt
        arch -x86_64 python3 -m pip install pyinstaller
        
        arch -x86_64 python3 -m PyInstaller --noconfirm MoldForge_mac.spec

    - name: Ad-hoc Codesign for the .app Bundle
      run: |
        # Ensure we are applying ad-hoc signatures to satisfy macOS Gatekeeper
        find dist/MOLDFORGE_RELEASE/MoldForge.app -type f \( -name "*.dylib" -o -name "*.so" \) -exec codesign --force --sign - {} \;
        codesign --force --sign - dist/MOLDFORGE_RELEASE/MoldForge.app/Contents/MacOS/MoldForge
        codesign --force --sign - dist/MOLDFORGE_RELEASE/MoldForge.app

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MoldForge-Mac
        path: dist/