name: Build Mac (Self-Hosted Intel Clean)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: [self-hosted, mac-local]
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deep Clean and Build
      run: |
        # Remove any previous build artifacts and environment
        rm -rf build/ dist/ venv/
        
        # Create a fresh x86_64 virtual environment
        arch -x86_64 /Library/Frameworks/Python.framework/Versions/3.11/bin/python3 -m venv venv
        source venv/bin/activate
        
        # Fresh install of all dependencies
        arch -x86_64 python3 -m pip install --upgrade pip
        arch -x86_64 python3 -m pip install -r requirements.txt
        arch -x86_64 python3 -m pip install pyinstaller
        
        # Build using the spec file
        arch -x86_64 python3 -m PyInstaller --noconfirm MoldForge_mac.spec

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MoldForge-Mac
        path: dist/