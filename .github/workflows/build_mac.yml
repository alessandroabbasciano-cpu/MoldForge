name: Build Mac (Self-Hosted Pure Intel Mode)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: [self-hosted, mac-local]
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deep Clean and Setup Virtual Environment (Intel Only)
      run: |
        rm -rf build/ dist/ venv/
        
        # Force the environment creation using the x86_64 slice of your Python
        arch -x86_64 /Library/Frameworks/Python.framework/Versions/3.11/bin/python3 -m venv venv
        source venv/bin/activate
        
        # CRITICAL: Force pip to download ONLY Intel (x86_64) binaries
        # This mimics exactly what the GitHub cloud runner does
        arch -x86_64 python3 -m pip install --upgrade pip
        arch -x86_64 python3 -m pip install --only-binary=:all: --platform macosx_10_9_x86_64 -r requirements.txt
        arch -x86_64 python3 -m pip install pyinstaller
        
        # Build the application forcing x86_64 architecture
        arch -x86_64 python3 -m PyInstaller --noconfirm MoldForge_mac.spec

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MoldForge-Mac
        path: dist/