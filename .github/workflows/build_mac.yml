name: Build Mac (Self-Hosted ARM64)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  
jobs:
  build-mac:
    runs-on: [self-hosted, mac-local]
    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Deep Clean and Setup Virtual Environment (ARM64 Native)
      run: |
        rm -rf build/ dist/ venv/
        python3 -m venv venv
        source venv/bin/activate
        python3 -m pip install --upgrade pip
        python3 -m pip install -r requirements.txt
        python3 -m pip install pyinstaller
        python3 -c "import matplotlib.font_manager"

    - name: Generate version file from Git Tag
      shell: bash
      run: echo "__version__ = '${{ github.ref_name }}'" > version.py
        
    - name: Build the application
      run: |
        source venv/bin/activate
        python3 -m PyInstaller --noconfirm MoldForge_mac.spec

    - name: Create Clean ZIP
      run: |
        cd dist/MOLDFORGE_RELEASE
        zip -ry ../../MoldForge-Mac-ARM64.zip .
        
    - name: Upload Mac ARM64 Artifact
      uses: actions/upload-artifact@v5
      with:
        name: MoldForge-Mac-ARM64
        path: MoldForge-Mac-ARM64.zip