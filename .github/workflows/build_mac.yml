name: Build Mac (Self-Hosted x64 Folder Mode)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: [self-hosted, mac-local]
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deep Clean and Setup Virtual Environment (x64)
      run: |
        # Remove old build artifacts and environments
        rm -rf build/ dist/ venv/
        
        # Create virtual environment using Universal Python
        arch -x86_64 /Library/Frameworks/Python.framework/Versions/3.11/bin/python3 -m venv venv
        source venv/bin/activate
        
        # Install dependencies
        arch -x86_64 python3 -m pip install --upgrade pip
        arch -x86_64 python3 -m pip install -r requirements.txt
        arch -x86_64 python3 -m pip install pyinstaller
        
        # Pre-build Matplotlib font cache during the workflow to prevent launch freezes
        arch -x86_64 python3 -c "import matplotlib.font_manager"
        
        # Build the application using the spec file (Architecture target is now INSIDE the spec file)
        arch -x86_64 python3 -m PyInstaller --noconfirm MoldForge_mac.spec

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MoldForge-Mac
        path: dist/