name: Build Mac (Self-Hosted x64 Maximum Compatibility)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: [self-hosted, mac-local]
    env:
      RUNNER_TOOL_CACHE: /Users/abba/actions-runner/_work/_tool
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Prepare Local Tool Cache Directory
      run: |
        mkdir -p /Users/abba/actions-runner/_work/_tool

    - name: Setup Pristine Python (Intel x64)
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        architecture: "x64"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt
        python -m pip install pyinstaller

    - name: Build Application
      run: |
        python -m PyInstaller --noconfirm MoldForge_mac.spec

    - name: Ad-hoc Codesign
      run: |
        find dist/MOLDFORGE_RELEASE -type f \( -name "*.dylib" -o -name "*.so" \) -exec codesign --force --sign - {} \;
        codesign --force --sign - dist/MOLDFORGE_RELEASE/MoldForge

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MoldForge-Mac
        path: dist/