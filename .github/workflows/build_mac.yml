name: Build Mac (Self-Hosted x64)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: [self-hosted, mac-local]
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deep Clean and Setup Virtual Environment (x64)
      run: |
        # Clean previous attempts
        rm -rf build/ dist/ venv/
        
        # Create virtual environment using the local Universal Python installer
        arch -x86_64 /Library/Frameworks/Python.framework/Versions/3.11/bin/python3 -m venv venv
        source venv/bin/activate
        
        # Install dependencies natively in x64 mode
        arch -x86_64 python3 -m pip install --upgrade pip
        arch -x86_64 python3 -m pip install -r requirements.txt
        arch -x86_64 python3 -m pip install pyinstaller
        
        # Build the application
        arch -x86_64 python3 -m PyInstaller --noconfirm MoldForge_mac.spec

    - name: Ad-hoc Codesign
      run: |
        # Sign the libraries and the final executable
        find dist/MOLDFORGE_RELEASE -type f \( -name "*.dylib" -o -name "*.so" \) -exec codesign --force --sign - {} \;
        codesign --force --sign - dist/MOLDFORGE_RELEASE/MoldForge

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MoldForge-Mac
        path: dist/