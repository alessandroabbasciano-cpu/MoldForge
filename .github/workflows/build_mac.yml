name: Build Mac (Self-Hosted)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: [self-hosted, mac-local]
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Pristine Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt
        python -m pip install pyinstaller

    - name: Build Application
      run: |
        python -m PyInstaller --noconfirm MoldForge_mac.spec

    - name: Minimal Ad-hoc Codesign
      run: |
        codesign --force --sign - dist/MOLDFORGE_RELEASE/MoldForge

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MoldForge-Mac
        path: dist/