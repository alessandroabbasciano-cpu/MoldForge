name: Build Mac (Self-Hosted)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: [self-hosted, mac-local]
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install -r requirements.txt
        python3 -m pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        # Usiamo --collect-all per forzare PyInstaller a prendere ogni singolo pezzo di VTK e CadQuery
        pyinstaller --noconfirm --onedir --windowed \
          --collect-all vtkmodules \
          --collect-all casadi \
          --collect-all cadquery \
          --collect-all OCP \
          --add-data "shapes_library:shapes_library" \
          --add-data "fb_presets.json:." \
          --add-data "icon.ico:." \
          --icon "icon.ico" \
          app.py
    
    - name: Ad-hoc Codesign for ARM64
      run: |
        find dist/MOLDFORGE_RELEASE -type f \( -name "*.dylib" -o -name "*.so" -o -name "MoldForge" \) -exec codesign --force --deep --sign - {} \;

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MoldForge-Mac
        path: dist/