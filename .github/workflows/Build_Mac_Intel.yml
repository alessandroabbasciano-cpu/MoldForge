name: Build Mold Forge Mac Intel

on:
  workflow_dispatch:

jobs:
  build_intel:
    name: Build on macOS Intel (via Rosetta and Universal Python)
    runs-on: macos-14

    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Install Official Python 3.10 (Universal2)
      # Bypasses the broken GitHub setup-python action
      run: |
        curl -O https://www.python.org/ftp/python/3.10.14/python-3.10.14-macos11.pkg
        sudo installer -pkg python-3.10.14-macos11.pkg -target /

    - name: Install Dependencies (Forced to x86_64)
      shell: bash
      # 'arch -x86_64' forces the universal python to run as Intel, downloading Intel wheels
      run: |
        arch -x86_64 /usr/local/bin/python3 -m pip install --upgrade pip
        arch -x86_64 /usr/local/bin/python3 -m pip install cadquery
        arch -x86_64 /usr/local/bin/python3 -m pip install -r requirements.txt
        arch -x86_64 /usr/local/bin/python3 -m pip install PySide6==6.6.3 pyinstaller

    - name: Build with PyInstaller (Forced to x86_64)
      shell: bash
      # Compiles the x86_64 executable
      run: |
        arch -x86_64 /usr/local/bin/python3 -m PyInstaller MoldForge_m86.spec

    - name: Codesign ad-hoc
      run: codesign --force --deep --sign - dist/MOLDFORGE_RELEASE/MoldForge.app

    - name: Package for Intel Release
      run: |
        cd dist/MOLDFORGE_RELEASE
        zip -ry ../../MoldForge-macOS-Intel_x64.zip .

    - name: Upload Intel Artifact
      uses: actions/upload-artifact@v5
      with:
        name: MoldForge-Mac-Intel
        path: MoldForge-macOS-Intel_x64.zip