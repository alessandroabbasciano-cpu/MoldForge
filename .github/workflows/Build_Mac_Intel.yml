name: Build Mold Forge Mac Intel

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_intel:
    name: Build on macOS Intel (via Rosetta)
    runs-on: macos-14

    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Install Rosetta 2 (CRITICAL FIX)
      run: softwareupdate --install-rosetta --agree-to-license

    - name: Install Official Universal Python 3.10.11
      run: |
        curl -L -o python-installer.pkg https://www.python.org/ftp/python/3.10.11/python-3.10.11-macos11.pkg
        sudo installer -pkg python-installer.pkg -target /

    - name: Install Dependencies (Forced Intel)
      shell: bash
      run: |
        PYTHON_BIN="/Library/Frameworks/Python.framework/Versions/3.10/bin/python3"
        arch -x86_64 $PYTHON_BIN -m pip install --upgrade pip
        arch -x86_64 $PYTHON_BIN -m pip install cadquery
        arch -x86_64 $PYTHON_BIN -m pip install -r requirements.txt
        arch -x86_64 $PYTHON_BIN -m pip install PySide6==6.6.3 pyinstaller

    - name: Build with PyInstaller (Forced Intel)
      shell: bash
      run: |
        PYTHON_BIN="/Library/Frameworks/Python.framework/Versions/3.10/bin/python3"
        arch -x86_64 $PYTHON_BIN -m PyInstaller MoldForge_m86.spec

    - name: Codesign ad-hoc
      run: codesign --force --deep --sign - dist/MOLDFORGE_RELEASE/MoldForge.app

    - name: Package for Intel Release
      run: |
        cd dist/MOLDFORGE_RELEASE
        zip -ry ../../MoldForge-macOS-Intel_x64.zip .

    - name: Upload Intel Artifact
      uses: actions/upload-artifact@v5
      with:
        name: MoldForge-Mac-Intel
        path: MoldForge-macOS-Intel_x64.zip