name: Build Mold Forge Mac Intel

on:
  workflow_dispatch: # Manual trigger only

jobs:
  build_intel:
    name: Build on macOS Intel
    runs-on: macos-13 # Mandatory for x86_64 architecture

    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Dependencies
      shell: bash
      run: |
        pip install cadquery
        pip install -r requirements.txt
        pip install PySide6==6.6.3 pyinstaller

    - name: Build with PyInstaller
      shell: bash
      run: |
        # Ensure MoldForge.spec exists in your root folder
        pyinstaller MoldForge_m86.spec

    - name: Codesign ad-hoc
      # This allows the app to run on Mac without crashing immediately
      run: codesign --force --deep --sign - dist/MoldForge.app

    - name: Package for Intel Release
      run: |
        cd dist/MOLDFORGE_RELEASE
        zip -ry ../../MoldForge-macOS-Intel_x64.zip .

    - name: Upload Intel Artifact
      uses: actions/upload-artifact@v5
      with:
        name: MoldForge-Mac-Intel
        path: dist/MOLDFORGE_RELEASE/