name: Build Arch Linux (Self-Hosted)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-arch:
    runs-on: [self-hosted, arch-local]
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Prepare Docker Image
      run: |
        cat << 'EOF' > Dockerfile.builder
        FROM ubuntu:22.04
        ENV DEBIAN_FRONTEND=noninteractive
        RUN apt-get update && apt-get install -y python3 python3-pip python3-venv libgl1 libgl1-mesa-glx libosmesa6 libglu1-mesa libxi-dev libxmu-dev libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-xinerama0 libxcb-xkb1 libxkbcommon-x11-0 libxcb-shape0 libxcb-cursor0 python3-tk libglib2.0-0 libxrender1 libdbus-1-3
        RUN python3 -m venv /opt/venv
        ENV PATH="/opt/venv/bin:$PATH"
        RUN pip install --upgrade pip cadquery PySide6==6.6.3 pyinstaller
        EOF
        docker build -t moldforge-ubuntu-builder -f Dockerfile.builder .

    - name: Compile in Docker
      run: |
        cat << 'EOF' > build_linux.sh
        pip install -r requirements.txt
        
        # Build using PyInstaller
        pyinstaller MoldForge.spec
        
        # Clean up the problematic library that conflicts with Arch Linux's Mesa
        rm -f dist/MOLDFORGE_RELEASE/libstdc++.so.6
        
        # Restore permissions to the workspace
        chown -R $(stat -c '%u:%g' .) .
        EOF
        chmod +x build_linux.sh
        docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace moldforge-ubuntu-builder bash build_linux.sh

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MoldForge-arch-local
        path: dist/MOLDFORGE_RELEASE/