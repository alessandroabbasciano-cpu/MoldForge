name: Build Linux (Universal Portable Folder)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: [self-hosted, arch-local]
    
    # Run inside Debian 11 container to ensure glibc 2.31 compatibility across all Linux distros
    container:
      image: python:3.10-bullseye
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Dependencies for Build
      run: |
        apt-get update
        # Install libraries required by OpenGL/VTK during compilation
        apt-get install -y libgl1 libglib2.0-0 libxext6 libxrender1 libx11-6

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install cadquery PySide6==6.6.3 pyinstaller
        pip install -r requirements.txt

    - name: Build with PyInstaller (OneDir Mode)
      run: |
        # Compile using the Linux spec file. 
        # The spec file is already configured to create dist/MOLDFORGE_RELEASE 
        # and copy 'shapes_library' and 'wiki' into it perfectly.
        pyinstaller MoldForge_linux.spec

    - name: Upload Linux Portable Folder
      uses: actions/upload-artifact@v4
      with:
        name: MoldForge-Linux-Portable
        # Upload the entire folder so users have direct access to shapes_library
        path: dist/MOLDFORGE_RELEASE/