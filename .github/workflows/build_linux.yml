name: Build Linux (Universal Portable Folder)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: [self-hosted, arch-local]
    
    container:
      image: python:3.10-bullseye
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Install System Dependencies for Build
      run: |
        apt-get update
        apt-get install -y libgl1 libglib2.0-0 libxext6 libxrender1 libx11-6 libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1 libxcb-image0 zip

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install cadquery PySide6==6.6.3 pyinstaller
        pip install -r requirements.txt

    - name: Build with PyInstaller (OneDir Mode)
      run: |
        pyinstaller MoldForge_linux.spec

    - name: Upload Linux Portable Folder
      uses: actions/upload-artifact@v5
      with:
        name: MoldForge-Linux-Portable
        path: dist/MOLDFORGE_RELEASE/

    - name: Create Clean ZIP
      run: |
        cd dist/MOLDFORGE_RELEASE/
        zip -r ../MoldForge-Linux.zip .

    - name: Upload Linux Artifact
      uses: actions/upload-artifact@v5
      with:
        name: MoldForge-Linux
        path: dist/MoldForge-Linux.zip