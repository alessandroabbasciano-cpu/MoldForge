name: Build Linux (Self-Hosted Arch)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: [self-hosted, arch-local]
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up isolated Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        # This action automatically downloads Python 3.10 into a temporary cache 
        # and adds it to the PATH only for the duration of this job.
        # It leaves your Arch Linux host system completely untouched.

    - name: Build with PyInstaller on Local Machine
      shell: bash
      run: |
        # 1. Create and activate virtual environment
        # This will now safely use the portable Python 3.10 we just downloaded
        python -m venv venv
        source venv/bin/activate
        
        # 2. Install dependencies
        python -m pip install --upgrade pip
        pip install cadquery PySide6==6.6.3 pyinstaller
        pip install -r requirements.txt
        
        # 3. Compile using the clean Linux spec file
        pyinstaller MoldForge_linux.spec

    - name: Pack into AppImage
      shell: bash
      run: |
        # Create AppDir structure for AppImage
        mkdir -p AppDir
        cp -r dist/MOLDFORGE_RELEASE/* AppDir/
        
        # Create .desktop launcher
        cat <<EOF > AppDir/MoldForge.desktop
        [Desktop Entry]
        Type=Application
        Name=Mold Forge
        Exec=MoldForge %F
        Icon=icon
        Categories=Engineering;3DGraphics;
        EOF
        
        # Set icon (fallback to splash.png)
        cp icon.png AppDir/icon.png 2>/dev/null || cp splash.png AppDir/icon.png 2>/dev/null || true
        
        # Entry point execution script
        cat <<EOF > AppDir/AppRun
        #!/bin/sh
        HERE="\$(dirname "\$(readlink -f "\${0}")")"
        exec "\${HERE}/MoldForge" "\$@"
        EOF
        chmod +x AppDir/AppRun

        # Download official AppImageKit tool and pack
        wget -q -O appimagetool "https://github.com/AppImage/AppImageKit/releases/download/13/appimagetool-x86_64.AppImage"
        chmod +x appimagetool
        ./appimagetool --appimage-extract-and-run AppDir MoldForge-Linux-x86_64.AppImage

    - name: Upload Linux Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MoldForge-linux-local
        path: |
          dist/MOLDFORGE_RELEASE/
          MoldForge-Linux-x86_64.AppImage