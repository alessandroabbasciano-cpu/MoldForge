name: Build Linux (Universal Portable Folder)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: [self-hosted, arch-local]
    
    # Run inside Debian 11 container to ensure glibc 2.31 compatibility across all Linux distros
    container:
      image: python:3.10-bullseye
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Install System Dependencies for Build
      run: |
        apt-get update
        apt-get install -y libgl1 libglib2.0-0 libxext6 libxrender1 libx11-6 libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1 libxcb-image0

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install cadquery PySide6==6.6.3 pyinstaller
        pip install -r requirements.txt

    - name: Build with PyInstaller (OneDir Mode)
      run: |
        pyinstaller MoldForge_linux.spec

    - name: Upload Linux Portable Folder
      uses: actions/upload-artifact@v5
      with:
        name: MoldForge-Linux-Portable
        # Upload the entire folder so users have direct access to shapes_library
        path: dist/MOLDFORGE_RELEASE/

    - name: Publish to GitHub Releases
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: MoldForge-Linux.zip
        draft: false
        prerelease: false
        generate_release_notes: false
        body: |
          🔥 **MOLD F.O.R.G.E. - Official V1.0.0 Release** 🔥

          The first standalone, professional, and cross-platform release is finally here. 
          Engineered for parametric fingerboard design, MoldForge combines the raw power of the OpenCASCADE CAD engine with a lightning-fast native GUI.

          **What's inside V1.0.0:**
          - 🍏 **Native macOS Support (Apple Silicon M1/M2/M3):** Optimized 3D engine, zero memory leaks, and buttery-smooth rendering with no WindowServer deadlocks.
          - 🪟 **Native Windows Support:** Clean executable and rock-solid PySide6 interface.
          - 🐧 **Native Linux Support:** Full compatibility with modern display servers.
          - 🚀 **Ultra-Fast Generation:** High-res 3D models and molds generated in seconds with pinpoint millimeter tolerances.
          
          **Installation:**
          Download the ZIP file for your OS below, extract the folder anywhere, and run the executable. No installation, no Python environments, no external dependencies required. 
          **Oh, and read the damn README included in the ZIP before asking questions.**