name: Assemble Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag'
        required: true
        type: string

permissions:
  contents: write

jobs:
  assemble-release:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Download Windows Artifact
      uses: dawidd6/action-download-artifact@v6
      with:
        workflow: build_windows.yml
        name: MoldForge-Windows
        path: release_assets/

    - name: Download Linux Artifact
      uses: dawidd6/action-download-artifact@v6
      with:
        workflow: build_linux.yml
        name: MoldForge-Linux
        path: release_assets/

    - name: Download Mac ARM64 Artifact
      uses: dawidd6/action-download-artifact@v6
      with:
        workflow: build_mac.yml
        name: MoldForge-Mac-ARM64
        path: release_assets/

    - name: Download Mac Intel Artifact
      uses: dawidd6/action-download-artifact@v6
      with:
        workflow: Build_Mac_Intel.yml
        name: MoldForge-Mac-Intel
        path: release_assets/

    - name: Publish Draft Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.tag_name }}
        name: MOLD F.O.R.G.E. - ${{ github.event.inputs.tag_name }}
        draft: true
        prerelease: false
        generate_release_notes: false
        files: release_assets/*
        body: |
          🔥 **MOLD F.O.R.G.E. - v1.0.3** 🔥

          The first standalone, cross-platform, parametric fingerboard mold designer.
          MoldForge combines the raw power of the OpenCASCADE CAD engine with a lightning-fast native GUI.

          **Installation:**
          Download the `.zip` file for your OS below, extract the folder anywhere, and run the executable. No installation, no Python environments, no external dependencies required. 
          *(Mac Users: make sure to read the included `README_MAC.md` to bypass the initial Gatekeeper block).*

          **Oh, and read the Wiki before asking how to use it!**

          📖 **Community:** We opened a Guestbook! Drop by the GitHub Discussions tab and say hi.

          **What's New in v1.0.3:**

          ### Fixed
          - **3D Engine (Topological Crash):** Resolved a critical `ValueError: Inner wires not allowed` in the OpenCASCADE kernel. The crash occurred when generating tapered truck pins with a diameter exceeding 1.9mm due to overlapping extrusion boundaries. Re-engineered the boolean operation to instantiate and translate a single master pin via `.eachpoint()`, preventing wire collisions entirely.
          - **UI / Data Parsing (Race Condition):** Fixed a signal loop bug where loading asymmetric configuration files (`.json` or `.txt`) would inadvertently trigger the "Symmetrical" checkbox state change. This caused the UI to aggressively overwrite the imported Tail parameters with Nose values. Implemented strict `blockSignals()` shielding during the data injection phase to ensure asymmetric setups load accurately.

          ### Changed
          - **GUI (Parameter Limits):** Increased the maximum allowable Mold Base Width from 70mm to 90mm.

          ### Documentation
          - **Custom Shapes (DXF):** Heavily revised the vector import guidelines (`4-Custom-Shapes-DXF.md`). Added critical warnings regarding ghost/hidden layers (e.g., Layer 0) and imperial/metric unit conflicts. These vector artifacts were responsible for massive bounding box miscalculations, leading to `Out of bounds` boolean failures in the 3D engine.