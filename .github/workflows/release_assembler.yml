name: Assemble Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag'
        required: true
        type: string

permissions:
  contents: write

jobs:
  assemble-release:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Download Windows Artifact
      uses: dawidd6/action-download-artifact@v6
      with:
        workflow: build_windows.yml
        name: MoldForge-Windows
        path: release_assets/

    - name: Download Linux Artifact
      uses: dawidd6/action-download-artifact@v6
      with:
        workflow: build_linux.yml
        name: MoldForge-Linux
        path: release_assets/

    - name: Download Mac ARM64 Artifact
      uses: dawidd6/action-download-artifact@v6
      with:
        workflow: build_mac.yml
        name: MoldForge-Mac-ARM64
        path: release_assets/

    - name: Download Mac Intel Artifact
      uses: dawidd6/action-download-artifact@v6
      with:
        workflow: Build_Mac_Intel.yml
        name: MoldForge-Mac-Intel
        path: release_assets/

    - name: Publish Draft Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.tag_name }}
        name: MOLD F.O.R.G.E. - ${{ github.event.inputs.tag_name }}
        draft: true
        prerelease: false
        generate_release_notes: false
        files: release_assets/*
        body: |
          🔥 **MOLD F.O.R.G.E. - v1.1.0** 🔥

          The first standalone, cross-platform, parametric fingerboard mold designer.
          MoldForge combines the raw power of the OpenCASCADE CAD engine with a lightning-fast native GUI.

          **Installation:**
          Download the `.zip` file for your OS below, extract the folder anywhere, and run the executable. No installation, no Python environments, no external dependencies required. 
          *(Mac Users: make sure to read the included `README_MAC.md` to bypass the initial Gatekeeper block).*

          **Oh, and read the Wiki before asking how to use it!**

          📖 **Community:** We opened a Guestbook! Drop by the GitHub Discussions tab and say hi.

          **What's New in v1.1.0:**

          ### New Features
          - **Spoon Kicks:** Added 3D concave curvature logic for Nose and Tail, allowing for high-performance board shapes.
          - **Beast Mode (Extreme Mode):** New toggle to unlock all geometric safety limits (-9999 to 9999) for experimental and non-standard mold design.
          - **Community Shapes Store:** Integrated browser to download community-designed DXF shapes directly from GitHub.
          - **Parametric Bolt Holes:** Full control over truck hole diameter and spacing (Old School vs. New School vs. Custom).
          - **Version Checker:** Automatic background check for new releases on startup.

          ### Fixed/Improved
          - **STL Export Removed:** Switched entirely to high-precision STEP exports for better CNC/3D Printing compatibility.
          - **UI Refactoring:** Grouped Wheel Flare parameters and optimized panel spacing for smaller screens.
          - **MacOS/Linux Stability:** Patched several OpenGL and font-cache related deadlocks during startup.