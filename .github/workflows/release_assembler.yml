name: Assemble Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag'
        required: true
        type: string

permissions:
  contents: write

jobs:
  assemble-release:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Download Windows Artifact
      uses: dawidd6/action-download-artifact@v6
      with:
        workflow: build_windows.yml
        name: MoldForge-Windows
        path: release_assets/

    - name: Download Linux Artifact
      uses: dawidd6/action-download-artifact@v6
      with:
        workflow: build_linux.yml
        name: MoldForge-Linux
        path: release_assets/

    - name: Download Mac ARM64 Artifact
      uses: dawidd6/action-download-artifact@v6
      with:
        workflow: build_mac.yml
        name: MoldForge-Mac-ARM64
        path: release_assets/

    - name: Download Mac Intel Artifact
      uses: dawidd6/action-download-artifact@v6
      with:
        workflow: Build_Mac_Intel.yml
        name: MoldForge-Mac-Intel
        path: release_assets/

    - name: Publish Draft Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.tag_name }}
        name: MOLD F.O.R.G.E. - ${{ github.event.inputs.tag_name }}
        draft: true
        prerelease: false
        generate_release_notes: false
        files: release_assets/*
        body: |
          🔥 **MOLD F.O.R.G.E. - v1.3.0** 🔥

          This update focuses heavily on Quality of Life (QoL), precise physical measurements, and architectural stability for the core CAD engine. We've bridged the gap between mathematical purity and real-world fingerboard manufacturing standards.

          ### ✨ New Features & UI Tools
          * **Interactive 3D Measurement Tool:** We've turned your cursor into a digital caliper. Click the new `MEASURE` button in the 3D viewport, pick any two points on your generated mesh, and get instant, real-time distance readouts directly on the screen.
          * **Outer Wheelbase Reference:** Designing based on outer truck holes? Activate `Show Outer Wheelbase Eq.` in the Tools menu. A new read-only label will dynamically calculate and display your outer wheelbase in real-time without compromising the pure inner-wheelbase math of the core engine.
          * **Truck Width Logging:** A highly requested diagnostic tool. Enable `Log Truck Widths` in the Tools menu, and the console will automatically calculate and print the precise width of the deck exactly at the truck mounting coordinates.

          ### 🛠 Engine & Architecture Upgrades
          * **Side Locks Optimization (Under the Hood):** The interlocking Side Locks architecture in the `cq_model.py` core engine has been completely refactored. The boolean operations now utilize optimized clearance calculations, ensuring bulletproof topological stability and flawlessly clean mesh generation for 3D printing.

          ### 🐛 Bug Fixes
          * Fixed an initialization bug where state persistence for the logging toggle and imperial/metric unit preferences were not properly restoring on startup.

          *(Note: As always, MOLD F.O.R.G.E. remains 100% standalone and portable. Just extract the folder and run the executable!)*