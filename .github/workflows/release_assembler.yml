name: Assemble Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag'
        required: true
        type: string

permissions:
  contents: write

jobs:
  assemble-release:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Download Windows Artifact
      uses: dawidd6/action-download-artifact@v6
      with:
        workflow: build_windows.yml
        name: MoldForge-Windows
        path: release_assets/

    - name: Download Linux Artifact
      uses: dawidd6/action-download-artifact@v6
      with:
        workflow: build_linux.yml
        name: MoldForge-Linux
        path: release_assets/

    - name: Download Mac ARM64 Artifact
      uses: dawidd6/action-download-artifact@v6
      with:
        workflow: build_mac.yml
        name: MoldForge-Mac-ARM64
        path: release_assets/

    - name: Download Mac Intel Artifact
      uses: dawidd6/action-download-artifact@v6
      with:
        workflow: Build_Mac_Intel.yml
        name: MoldForge-Mac-Intel
        path: release_assets/

    - name: Publish Draft Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.tag_name }}
        name: MOLD F.O.R.G.E. - ${{ github.event.inputs.tag_name }}
        draft: true
        prerelease: false
        generate_release_notes: false
        files: release_assets/*
        body: |
          🔥 **MOLD F.O.R.G.E. - v1.1.0** 🔥

          The first standalone, cross-platform, parametric fingerboard mold designer.
          MoldForge combines the raw power of the OpenCASCADE CAD engine with a lightning-fast native GUI.

          **Installation:**
          Download the `.zip` file for your OS below, extract the folder anywhere, and run the executable. No installation, no Python environments, no external dependencies required. 
          *(Mac Users: make sure to read the included `README_MAC.md` to bypass the initial Gatekeeper block).*

          **Oh, and read the Wiki before asking how to use it!**

          📖 **Community:** We opened a Guestbook! Drop by the GitHub Discussions tab and say hi.

          **What's New in v1.2.0:**

          ### New Features
          - **State Persistence (Autosave):** The application now remembers your exact workspace! It silently saves your parameters and active preset on exit, restoring everything perfectly upon your next startup.
          - **Cut Base (Flush Sides) Toggle:** Added a dedicated mode for vertical 3D printing. It automatically matches the Base Width to the Core Width to create flush sides, smartly disabling irrelevant hardware like guide holes and base fillets.

          ### Fixed / Improved
          - **SideLocks Friction Fix:** Completely redesigned the interlocking side tabs. They now feature a dynamic L-shape ribbed structure that guarantees a perfect clearance on the Y-axis, completely eliminating rubbing and friction when closing the molds.
          - **Mold Terminology Correction:** Apparently, we "misgendered" our molds (shoutout to some sexist out there who pointed this out!). We have gracefully swapped the 'Male' and 'Female' designations across the entire UI, logic, and exported filenames to strictly adhere to standard CNC/manufacturing terminology.
          - **Mold Gap Precision:** Fixed calculation anomalies and boolean constraints regarding the Mold Gap to ensure flawless intersections and spacing.
          - **Versioning System:** Fixed internal version tracking and updater alignment for correct release tagging.